spring:
  application:
    name: certmonitorcloud

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cert_monitor}
    username: ${DB_USER:cert_admin}
    password: ${DB_PASSWORD:change_me_to_a_strong_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Google OAuth2 / OIDC ──────────────────────────────────────────────────
  # Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in your .env file.
  # Obtain from: https://console.cloud.google.com → APIs & Services → Credentials
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            issuer-uri: https://accounts.google.com

server:
  port: ${APP_PORT:443}
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEY_STORE:/app/ssl/certmonitor.jks}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:certmonitor_ssl}
    key-store-type: JKS
    key-alias: certmonitor

# ── CertMonitor settings ──────────────────────────────────────────────────────
certmonitor:
  keystore:
    base-dir: ${KEYSTORE_BASE_DIR:./keystores}

  jwt:
    # Must be at least 32 characters. Set JWT_SECRET in your .env — never commit this.
    # The default below is for local dev only — always override in production.
    secret: ${JWT_SECRET:local-dev-only-insecure-secret-do-NOT-use-in-production-replace-this}
    # Token lifetime in milliseconds. Default: 24 hours.
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  config: classpath:log4j2.xml
