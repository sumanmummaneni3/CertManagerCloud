services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cert_monitor_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Spring Boot Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cert_monitor_app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      APP_PORT: 443
      KEYSTORE_BASE_DIR: /app/keystores
      LOG_DIR: ${LOG_DIR:-/app/logs}
      # SSL — self-signed cert generated in Dockerfile
      # For production: mount a real cert and update these paths
      SSL_ENABLED: "true"
      SSL_KEY_STORE: /app/ssl/certmonitor.jks
      SSL_KEY_STORE_PASSWORD: certmonitor_ssl
      # JWT — loaded from .env file
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "${APP_PORT:-443}:443"
    volumes:
      - keystore_data:/app/keystores
      - log_data:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  keystore_data:
    driver: local
  log_data:
    driver: local
